<!-- rotate a box every .1 seconds 15 degrees, with a toggle on/off button -->
<game name="rotating box" author="pepsi">
  <camera position="0 0 4" />
  <box name="coolBox" color="0.9 0 0" position="0 0 0" />
  <tube />
  <ball />
  <button name="toggle">toggle spinning</button>

  <script local>
    toggle.on("click", () => {
      game.emit("toggleBox");
    });
  </script>

  <script>
    let rotate = true;
    game.on("toggleBox", (ctx) => {
      rotate = !rotate;
    });

    let box = coolBox;
    setInterval(() => {
      if (rotate) {
        box.transform.rotate(0, 15, 0);
      }
    }, 100);
  </script>
</game>
