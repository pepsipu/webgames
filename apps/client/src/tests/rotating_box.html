<!-- rotate a box every .1 seconds 15 degrees, with a toggle on/off button -->
<game name="rotating box" author="pepsi">

  <scene>
    <box id="coolBox" color="red" x="0" y="0" z="0" />
    <tube />
    <ball />
  </scene>

  <ui>
    <button id="toggle">toggle spinning</button>
  </ui>

  <localscript>
    game.getElementById("toggle").on("click", () => {
        game.emit("toggleBox");
    });
  </localscript>

  <script>
    let rotate = true;
    game.on("toggleBox", (ctx) => {
        rotate = !rotate;
    })

    let box = document.getElementById("coolBox");
    setInterval(() => {
      if (rotate) {
        box.transform.rotate(0, 15, 0);
      }
    }, 100);
  </script>

</game>
