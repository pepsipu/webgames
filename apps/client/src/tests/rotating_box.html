<!-- rotate a box every .1 seconds 15 degrees, with a toggle on/off button -->

<game name="my awesome game" author="pepsipu">
  <scene>
    <box color="red" id="coolBox" position="0 0 0" />
  </scene>
  <ui>
    <button onClick="rotate = !rotate">Toggle</button>
  </ui>

  <script>
    let rotate = true;

    let box = document.getElementById("coolBox");
    setInterval(() => {
      if (rotate) {
        box.transform.rotate(0, 15, 0);
      }
    }, 100);
  </script>
</game>
