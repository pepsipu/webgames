<game name="move the box">
  <camera position="0 0 4" />
  <template id="smiley">
    <ball />
  </template>

  <script local>
    game.on("keydown.W", () => {
      game.emit("makeSmiley");
    });
  </script>

  <script>
    let template = document.getElementById("smiley");
    game.on("makeSmiley", () => {
      document.append(template.content.cloneNode(true));
    });
  </script>
</game>
