<game name="move the box">
  <scene>
    <template id="smiley">
      <ball />
    </template>
  </scene>

  </script local>
    game.on("keydown.W", () => {
      game.emit("makeSmiley");
    });
  </script>

  <script>
    let template = document.getElementById("smiley");
    game.on("makeSmiley", () => {
      scene.appendChild(template.content.cloneNode(true));
    });
  </script>
</game>
