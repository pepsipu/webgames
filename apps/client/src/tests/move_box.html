<game name="movethebox" author="pepsi">
  <camera position="0 0 4" />
  <box id="thebox" />
  <tube />
  <ball />

  <script local>
    // make player-local interaction trigger server events
    game.on("keydown.w", () => {
        game.emit("movethebox");
    });
  </script>

  <script>
    game.on("movethebox", (ctx) => {
        const box = document.getElementById("thebox");
        box.x += 1;
    })
  </script>

</game>
