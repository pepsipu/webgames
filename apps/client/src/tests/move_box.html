<game name="movethebox" author="pepsi">

  <scene>
    <box id="thebox" />
    <tube />
    <ball />
  </scene>

  <script local>
    // make player-local ui interaction trigger server events
    game.on("keydown.w", () => {
        game.emit("movethebox");
    });
  </script>

  <script>
    game.on("movethebox", (ctx) => {
        const box = game.getElementById("thebox");
        box.x += 1;
    })
  </script>

</game>
