<!-- everything is enclosed in <game> /w optional info -->
<game name="my awesome game" author="pepsi">
  <camera position="0 0 4" />
  <box id="coolbox" />
  <tube />
  <ball id="pebble" />
  <button id="weso">awesoem button</button>

  <!-- clientside script -->
  <script local>
    // make player-local interaction trigger server events
    document.getElementById("weso").on("click", () => {
        game.emit("awe");
    });
  </script>

  <!-- serverside script -->
  <script>
    // custom, world-global event (doesn't depend on any particular in-game object)
    game.on("awe", (ctx) => {
        // ctx might contain the handle of the player who triggered the event
        const box = document.getElementById("coolbox");
        box.x += 1; // push!
    })

    const pebble = document.getElementById("pebble");
    // this event is specifically on the pebble object
    pebble.on("click", (ctx) => {
        pebble.y += 5; // jumping pebble!
    });
  </script>
</game>
