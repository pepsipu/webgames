<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamefile Parser Playground</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        padding: 20px;
        background: #111827;
        color: #e5e7eb;
      }

      main {
        max-width: 1000px;
        margin: 0 auto;
        display: grid;
        gap: 12px;
      }

      textarea {
        width: 100%;
        min-height: 320px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        border: 1px solid #374151;
        border-radius: 8px;
        background: #0b1220;
        color: #e5e7eb;
        padding: 10px;
      }

      button {
        width: fit-content;
        border: 1px solid #4b5563;
        background: #2563eb;
        color: white;
        border-radius: 6px;
        padding: 8px 14px;
        cursor: pointer;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        background: #0b1220;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 12px;
        min-height: 220px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Gamefile Parser Playground</h1>
      <p>Paste a gamefile XML and click parse. Output is shown below and also logged to the browser console.</p>

      <textarea id="source"><game name="my awesome game" author="pepsi">
  <scene>
    <box id="coolbox" />
    <tube />
    <ball id="pebble" />
  </scene>

  <ui>
    <button id="weso">awesome button</button>
  </ui>

  <script local>
    game.getElementById("weso").on("click", () => {
      game.emit("awe");
    });
  </script>

  <script>
    game.on("awe", (ctx) => {
      const box = game.getElementById("coolbox");
      box.x += 1;
    });
  </script>
</game>
      </textarea>

      <button id="parse" type="button">Parse gamefile</button>
      <pre id="output">Click "Parse gamefile" to see parsed output.</pre>
    </main>

    <script type="module" src="./parser_playground.ts"></script>
  </body>
</html>
